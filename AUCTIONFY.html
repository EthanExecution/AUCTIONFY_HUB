            color: transparent;
            letter-spacing: 1px;
        }

        .nav-buttons {
            display: flex;

        }
        .nav-btn {
            background: none;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.6rem 1rem;

            font-weight: 800;
            color: #ff6b35;
            margin: 0.5rem 0;

            background: #e8f5e9;

            color: white;
            border: none;
            padding: 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;

            background: #ff6b35;
        }

            z-index: 1000;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
        }

            width: 90%;
            margin: 2rem auto;
            border-radius: 32px;
            padding: 1.8rem;
            position: relative;
        }

            top: 1rem;
            right: 1.5rem;
            font-size: 1.8rem;
            cursor: pointer;
            color: #666;
        }

            height: 85px;

            cursor: pointer;

        }

            margin: 0.6rem 0;
        }

        <button class="nav-btn cart-icon-btn" id="openCartBtn"><i class="fas fa-shopping-cart"></i>Cart <span id="cartCount">0</span></button>
    </div>

<div id="productsGrid" class="products-container"></div>

<!-- Product Detail Modal -->
<div id="productModal" class="modal">

    <div class="cart-total" id="cartTotal">Total: R0.00</div>
    <button id="proceedCheckoutBtn" class="checkout-btn">📦 Proceed to Order</button>
</div>

<!-- Checkout Information Modal -->
<div id="checkoutInfoModal" class="checkout-modal">

        <h3><i class="fas fa-clipboard-list"></i> Complete Your Order</h3>
        <input type="text" id="surname" placeholder="Surname & Initials (e.g. Van der Merwe J.)" required>
        <input type="tel" id="cellNumber" placeholder="Cell Number (e.g. 0821234567)" required>
        <input type="tel" id="whatsappNumber" placeholder="WhatsApp Number (if different)">
        <textarea id="address" rows="2" placeholder="Delivery Address (Street, City, Code)"></textarea>
        <label><strong>Send invoice via:</strong></label>
        <select id="invoiceMethod">
            <option value="whatsapp">WhatsApp</option>
            <option value="email">Email</option>
        </select>
        <input type="email" id="emailAddr" placeholder="Email address (required if Email selected)">
        <button id="finalSendOrderBtn" class="send-order-btn"><i class="fab fa-whatsapp"></i> / <i class="fas fa-envelope"></i> Send Order</button>
        <button id="closeCheckoutModal" style="margin-top:10px; background:#ccc; width:100%; padding:0.6rem; border:none; border-radius:40px;">Cancel</button>
    </div>
</div>

<!-- Floating WhatsApp Button -->
<div class="float-wa" id="floatWhatsAppBtn">

</div>

    let cart = [];
    let currentFilter = "all";   // all, new, pre, phones
    let savedScrollPosition = 0;
    let isModalOpen = false;

    // DOM elements
    const productsGrid = document.getElementById("productsGrid");
    const cartCountSpan = document.getElementById("cartCount");
    const cartPanel = document.getElementById("cartPanel");
    const cartOverlayDiv = document.getElementById("cartOverlay");
    const cartItemsList = document.getElementById("cartItemsList");
    const cartTotalSpan = document.getElementById("cartTotal");

    // Helper: save scroll before modal
    function saveScroll() { if (!isModalOpen) savedScrollPosition = window.scrollY; }
    function restoreScroll() { setTimeout(() => window.scrollTo(0, savedScrollPosition), 30); }

    // Render products based on filter
    function renderProducts() {
        let filtered = products;
        if (currentFilter === "new") filtered = products.filter(p => p.category === "new");
        else if (currentFilter === "pre") filtered = products.filter(p => p.category === "pre");
        else if (currentFilter === "phones") filtered = products.filter(p => p.category === "phones");
        else if (currentFilter === "all") filtered = products;

        if (filtered.length === 0) {
            productsGrid.innerHTML = `<div class="filter-message"><i class="fas fa-search"></i> No products in this category. Try others!</div>`;
            return;
        }

        productsGrid.innerHTML = filtered.map(prod => `
            <div class="product-card" data-id="${prod.id}">
                <img class="card-img" src="${prod.images[0]}" alt="${escapeHtml(prod.title)}" loading="lazy">
                <div class="card-info">
                    <div class="product-title">${escapeHtml(prod.title)} <span class="badge-category">${prod.category === 'new' ? '🆕 New' : prod.category === 'pre' ? '♻️ Pre-owned' : '📱 Phone'}</span></div>
                    <div class="price">R${prod.price.toLocaleString()}</div>
                    <div class="delivery-estimate"><i class="fas fa-truck-fast"></i> ${prod.delivery}</div>
                    <button class="add-to-cart-btn" data-id="${prod.id}"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                </div>
            </div>
        `).join('');

        // attach product click (open detail)
        document.querySelectorAll('.product-card').forEach(card => {
            const pid = card.getAttribute('data-id');
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('add-to-cart-btn')) return;
                openProductDetail(pid);
            });
        });
        // attach add-to-cart buttons
        document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const pid = btn.getAttribute('data-id');
                addToCart(pid);
            });
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Cart Logic
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(item => item.id === productId);
        if (existing) existing.quantity += 1;
        else cart.push({ id: productId, product: product, quantity: 1 });
        updateCartUI();
        showCartPanel();
    }

    function updateCartUI() {
        const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
        cartCountSpan.innerText = totalItems;
        if (cart.length === 0) {
            cartItemsList.innerHTML = "<div style='text-align:center; padding:2rem;'><i class='fas fa-shopping-basket'></i><br/>Cart is empty</div>";
            cartTotalSpan.innerText = `Total: R0.00`;
            return;
        }
        let total = 0;
        cartItemsList.innerHTML = cart.map((item, idx) => {
            const subtotal = item.product.price * item.quantity;
            total += subtotal;
            return `
                <div class="cart-item" data-idx="${idx}">
                    <img src="${item.product.images[0]}" alt="">
                    <div class="cart-item-info">
                        <div><strong>${escapeHtml(item.product.title)}</strong></div>
                        <div>R${item.product.price.toLocaleString()} each</div>
                        <div class="qty-control">
                            <button class="qty-dec" data-id="${item.id}">−</button>
                            <span>${item.quantity}</span>
                            <button class="qty-inc" data-id="${item.id}">+</button>
                            <button class="remove-item" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div>Subtotal: R${subtotal.toLocaleString()}</div>
                    </div>
                </div>
            `;
        }).join('');
        cartTotalSpan.innerText = `Total: R${total.toLocaleString()}`;
        // attach quantity events
        document.querySelectorAll('.qty-dec').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); modifyQuantity(btn.getAttribute('data-id'), -1); }));
        document.querySelectorAll('.qty-inc').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); modifyQuantity(btn.getAttribute('data-id'), 1); }));
        document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); removeCartItem(btn.getAttribute('data-id')); }));
    }

    function modifyQuantity(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }
    }
    function removeCartItem(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
    function showCartPanel() { cartPanel.classList.add('open'); cartOverlayDiv.style.display = 'block'; }
    function hideCartPanel() { cartPanel.classList.remove('open'); cartOverlayDiv.style.display = 'none'; }

    // Product Detail Modal with position restore
    function openProductDetail(productId) {
        const prod = products.find(p => p.id === productId);
        if (!prod) return;
        saveScroll();
        isModalOpen = true;
        const modal = document.getElementById('productModal');
        const modalBody = document.getElementById('modalBody');
        const thumbnailsHtml = prod.images.map((img, idx) => `<img src="${img}" data-img-index="${idx}" class="modal-thumb" style="width:80px;height:80px;object-fit:cover;border-radius:14px;cursor:pointer;border:2px solid #ddd;">`).join('');
        modalBody.innerHTML = `
            <h2>${escapeHtml(prod.title)}</h2>
            <img id="modalMainImage" class="main-modal-img" src="${prod.images[0]}" alt="main">
            <div class="modal-images" id="thumbContainer">${thumbnailsHtml}</div>
            <div class="modal-detail">
                <p><strong>💰 Price:</strong> R${prod.price.toLocaleString()}</p>
                <p><strong>🚚 Estimated Delivery:</strong> ${prod.delivery}</p>
                <p><strong>📝 Description:</strong><br> ${escapeHtml(prod.description)}</p>
                <button id="modalAddCartBtn" class="add-to-cart-btn" style="margin-top:1rem;"><i class="fas fa-cart-shopping"></i> Add to Cart</button>
            </div>
        `;
        modal.style.display = 'flex';
        // thumbnail switching
        document.querySelectorAll('.modal-thumb').forEach(thumb => {
            thumb.addEventListener('click', (e) => {
                const src = thumb.getAttribute('src');
                document.getElementById('modalMainImage').src = src;
            });
        });
        document.getElementById('modalAddCartBtn')?.addEventListener('click', () => {
            addToCart(prod.id);
            modal.style.display = 'none';
            isModalOpen = false;
            restoreScroll();
        });
    }

    function closeProductModal() {
        document.getElementById('productModal').style.display = 'none';
        isModalOpen = false;
        restoreScroll();
    }

    // ORDER GENERATION & SENDING (WhatsApp / Email)
    function generateOrderDetails(customerData) {
        const orderNumber = 'AUX-' + Date.now().toString().slice(-8) + Math.floor(Math.random() * 1000);
        const dateTime = new Date().toLocaleString('en-ZA');
        let itemsList = '';
        let totalCost = 0;
        cart.forEach(item => {
            const subtotal = item.product.price * item.quantity;
            totalCost += subtotal;
            itemsList += `• ${item.product.title} x${item.quantity} = R${subtotal.toLocaleString()}\n`;
        });
        const fullMessage = `🏷️ ORDER NUMBER: ${orderNumber}
📅 DATE & TIME: ${dateTime}
👤 SURNAME & INITIALS: ${customerData.surname}
📞 CELL NUMBER: ${customerData.cell}
📍 ORDER PLACE:
${itemsList}
💰 TOTAL COST: R${totalCost.toLocaleString()}
🏠 ADDRESS: ${customerData.address}

Thank you for shopping at AUCTIONFY!`;
        return { fullMessage, orderNumber, totalCost, dateTime };
    }

    // checkout submit
    document.getElementById("proceedCheckoutBtn")?.addEventListener('click', () => {
        if (cart.length === 0) { alert("Your cart is empty! Add items first."); return; }
        document.getElementById("checkoutInfoModal").style.display = 'flex';
        hideCartPanel();
    });
    document.getElementById("closeCheckoutModal")?.addEventListener('click', () => document.getElementById("checkoutInfoModal").style.display = 'none');
    document.getElementById("finalSendOrderBtn")?.addEventListener('click', () => {
        const surname = document.getElementById("surname").value.trim();
        const cell = document.getElementById("cellNumber").value.trim();
        const whatsappRaw = document.getElementById("whatsappNumber").value.trim();
        const address = document.getElementById("address").value.trim();
        const invoiceMethod = document.getElementById("invoiceMethod").value;
        const emailAddr = document.getElementById("emailAddr").value.trim();

        if (!surname || !cell || !address) { alert("Please fill Surname & Initials, Cell Number, and Address."); return; }
        const whatsappFinal = whatsappRaw || cell;
        const customer = { surname, cell, whatsapp: whatsappFinal, address, invoiceMethod, email: emailAddr };
        const { fullMessage, orderNumber, totalCost } = generateOrderDetails(customer);

        // send based on selection: to 0827662555 (WhatsApp) or Glume3r@gmail.com (email)
        if (invoiceMethod === "whatsapp") {
            // send to customer via WhatsApp
            const waCustomerLink = `https://wa.me/${whatsappFinal.replace(/\D/g, '')}?text=${encodeURIComponent(fullMessage + "\n\n📄 Your invoice is attached. AUCTIONFY team.")}`;
            window.open(waCustomerLink, '_blank');
            // also send to 0827662555 (admin)
            const adminMsg = `🔔 NEW ORDER #${orderNumber}\n${fullMessage}`;
            window.open(`https://wa.me/27827662555?text=${encodeURIComponent(adminMsg)}`, '_blank');
        } else if (invoiceMethod === "email") {
            if (!emailAddr) { alert("Please enter email address for invoice."); return; }
            const subject = `AUCTIONFY Order #${orderNumber} - Confirmation`;
            const body = fullMessage + "\n\nWe will process your order shortly.";
            window.location.href = `mailto:${emailAddr}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            // send to Glume3r@gmail.com
            window.location.href = `mailto:Glume3r@gmail.com?subject=${encodeURIComponent("Order from "+surname)}&body=${encodeURIComponent(fullMessage)}`;
        }
        alert(`✅ Order ${orderNumber} placed successfully! Total: R${totalCost.toLocaleString()}\nWe'll contact you shortly.`);
        cart = [];
        updateCartUI();
        renderProducts();
        document.getElementById("checkoutInfoModal").style.display = 'none';
        hideCartPanel();
    });

    // Navigation & filter
    document.querySelectorAll('.nav-btn[data-category]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const cat = btn.getAttribute('data-category');
            if (cat === 'about') {
                alert("📖 About AUCTIONFY: Your trusted marketplace for premium new laptops, pre-owned devices, and smartphones. We offer warranty, fast delivery, and excellent support.");
                return;
            }
            if (cat === 'new') currentFilter = 'new';
            else if (cat === 'pre') currentFilter = 'pre';
            else if (cat === 'phones') currentFilter = 'phones';
            else currentFilter = 'all';
            renderProducts();
        });
    });

    document.getElementById("openCartBtn")?.addEventListener('click', showCartPanel);
    document.getElementById("closeCartBtn")?.addEventListener('click', hideCartPanel);
    cartOverlayDiv.addEventListener('click', hideCartPanel);
    document.querySelector('.close-modal')?.addEventListener('click', closeProductModal);
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('productModal')) closeProductModal(); });
    document.getElementById("floatWhatsAppBtn")?.addEventListener('click', () => window.open("https://wa.me/27827662555?text=Hello%20AUCTIONFY%2C%20I%20need%20help%20with%20a%20product", "_blank"));

    // initial render
    renderProducts();
    updateCartUI();
</script>
</body>
</html>
